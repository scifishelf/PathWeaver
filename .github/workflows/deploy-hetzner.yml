name: 🚀 Deploy PathWeaver (Frontend) to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: deploy-main
      cancel-in-progress: false

    env:
      REMOTE_DIR: /home/deployuser/pathweaver

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 📦 Install deps
        working-directory: web
        run: npm ci

      - name: 🏗️ Build (Vite)
        working-directory: web
        run: npm run build

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

      - name: 📂 Create remote dir
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "mkdir -p $REMOTE_DIR"

      - name: 📤 Upload build (rsync)
        run: |
          rsync -az --delete web/dist/ ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }}:$REMOTE_DIR/

      - name: ✅ Post-deploy check (list files)
        run: ssh -o StrictHostKeyChecking=no ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} "ls -la $REMOTE_DIR | head -n 20"