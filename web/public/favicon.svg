<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e40af"/>

  <!-- Critical path edges (highlighted) -->
  <!-- Start → A -->
  <line x1="7" y1="16" x2="12" y2="16" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- A → End -->
  <line x1="20" y1="16" x2="25" y2="16" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Non-critical edge: A → B (diagonal up) -->
  <line x1="15.5" y1="11.5" x2="19" y2="9" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- B → End (diagonal down) -->
  <line x1="21" y1="10.5" x2="24.5" y2="14.5" stroke="#60a5fa" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- Node B (non-critical, smaller) -->
  <rect x="19" y="7.5" width="4" height="3" rx="0.75" fill="#3b82f6" opacity="0.7"/>

  <!-- Start node -->
  <rect x="3" y="13" width="6" height="6" rx="1.5" fill="white" opacity="0.25"/>
  <rect x="4" y="14" width="4" height="4" rx="1" fill="white" opacity="0.6"/>

  <!-- Node A (critical, center) -->
  <rect x="12" y="12" width="8" height="8" rx="1.5" fill="white"/>

  <!-- End node -->
  <rect x="23" y="13" width="6" height="6" rx="1.5" fill="white" opacity="0.25"/>
  <rect x="24" y="14" width="4" height="4" rx="1" fill="white" opacity="0.6"/>

  <!-- Critical path accent on center node -->
  <rect x="12" y="12" width="8" height="8" rx="1.5" fill="none" stroke="#fbbf24" stroke-width="1.25"/>
</svg>
